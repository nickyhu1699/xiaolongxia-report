function ck(){
  if(document.getElementById("pw").value===PW){
    document.getElementById("lock").style.display="none";
    localStorage.setItem("xlx_auth","1");
    window.onhashchange();
  }else{
    document.getElementById("err").textContent="密码错误，请重试";
  }
}
if(localStorage.getItem("xlx_auth")==="1"){document.getElementById("lock").style.display="none";}

function fm(ts){
  var d=new Date(ts*1000);
  return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2)+" "+("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2);
}

function ls(p){
  var info=document.getElementById("info");
  info.textContent="📌 当前目录: "+(p||"/");
  var h='<div class="list">';
  var depth=p?p.split("/").length+1:1;
  var items=[];
  for(var i=0;i<D.length;i++){
    var f=D[i],dd=f.d.split("/").length;
    if(dd!==depth)continue;
    if(!p&&dd===1)items.push(f);
    else if(p&&f.d.indexOf(p+"/")===0)items.push(f);
  }
  if(p)items.unshift({n:"..",d:p.split("/").slice(0,-1).join("/")||"",t:1,m:0});
  for(var i=0;i<items.length;i++){
    var f=items[i];
    var ic=f.t?"📁":"📄";
    var mt=f.t?"文件夹":f.n.split(".").pop().toUpperCase()+" · "+(f.s>1024?(f.s/1024).toFixed(1)+"KB":f.s+"B");
    var tm=f.m?"<div class=\"time\">"+fm(f.m)+"</div>":"";
    if(f.t){
      h+='<div class="row" onclick="ls(\''+esc(f.d)+'\')"><div class="ico">'+ic+'</div><div class="txt"><div class="t">'+f.n+'</div><div class="s">'+mt+'</div></div>'+tm+'</div>';
    }else{
      h+='<div class="row" onclick="rd(\''+esc(f.d)+'\')"><div class="ico">'+ic+'</div><div class="txt"><div class="t">'+f.n+'</div><div class="s">'+mt+'</div></div>'+tm+'</div>';
    }
  }
  h+='</div>';
  document.getElementById("v").innerHTML=h;
}

function esc(s){return s.replace(/\\/g,"\\\\").replace(/'/g,"\\'");}

function rd(p){
  fetch("files/"+p).then(function(r){return r.text()}).then(function(t){
    var ext=p.split(".").pop().toLowerCase();
    var b;
    if(ext==="md"){
      b='<div class="md">'+t
        .replace(/^### (.+)$/gm,"<h3>$1</h3>")
        .replace(/^## (.+)$/gm,"<h2>$1</h2>")
        .replace(/^# (.+)$/gm,"<h1>$1</h1>")
        .replace(/^> (.+)$/gm,"<blockquote>$1</blockquote>")
        .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
        .replace(/`(.+?)`/g,"<code>$1</code>")
        .replace(/^- (.+)$/gm,"<li>$1</li>")
        .replace(/^\d+\. (.+)$/gm,"<li>$1</li>")+"</div>";
    }else{
      b="<pre>"+t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")+"</pre>";
    }
    document.getElementById("v").innerHTML='<div class="back" onclick="ls(\'\')">🏠 首页</div><h3 style="padding:0 16px;font-size:14px;color:#666">'+p+'</h3>'+b;
    window.scrollTo(0,0);
  });
}

window.onhashchange=function(){
  if(document.getElementById("lock").style.display!=="none")return;
  var h=location.hash.slice(1);
  if(h.startsWith("/f/"))rd(h.slice(3));
  else ls(h);
};
window.onhashchange();
