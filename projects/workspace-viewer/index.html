function sha256(s){
  // Simple SHA-256 via SubtleCrypto
  return crypto.subtle.digest("SHA-256",new TextEncoder().encode(s)).then(function(b){
    return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,"0");}).join("");
  });
}

function ck(){
  var inp=document.getElementById("pw").value;
  if(!inp)return;
  sha256(inp).then(function(h){
    if(h===PH){
      document.getElementById("lock").style.display="none";
      sessionStorage.setItem("xlx","1");
      window.onhashchange();
    }else{
      document.getElementById("err").textContent="密码错误，请重试";
    }
  });
}

function fm(ts){
  var d=new Date(ts*1000);
  return ("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2)+" "+("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2);
}

function ls(p){

  var h='<div class="list">';
  var depth=p?p.split("/").length+1:1;

  for(var i=0;i<D.length;i++){
    var f=D[i],dd=f.d.split("/").length;
    if(dd!==depth)continue;

    var f=items[i];

    var tm=f.m?"<div class=\"time\">"+fm(f.m)+"</div>":"";

  }

}

  // Check if image
  if(IMG.indexOf(ext)>=0){
    document.getElementById("v").innerHTML='<div class="back" onclick="ls(\'\')">🏠 首页</div><h3 style="padding:0 16px;font-size:14px;color:#666">'+p+'</h3><div class="imgv"><img src="files/'+p+'" onclick="window.open(this.src)"></div>';
    window.scrollTo(0,0);
    return;
  }
  fetch("files/"+p).then(function(r){return r.text()}).then(function(t){
    var b;
    if(ext==="md"){
      b='<div class="md">'+t.replace(/^### (.+)$/gm,"<h3>$1</h3>").replace(/^## (.+)$/gm,"<h2>$1</h2>").replace(/^# (.+)$/gm,"<h1>$1</h1>").replace(/^> (.+)$/gm,"<blockquote>$1</blockquote>").replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/`(.+?)`/g,"<code>$1</code>").replace(/^- (.+)$/gm,"<li>$1</li>").replace(/^\d+\. (.+)$/gm,"<li>$1</li>")+"</div>";
    }else{
      b="<pre>"+t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")+"</pre>";
    }
    document.getElementById("v").innerHTML='<div class="back" onclick="ls(\'\')">🏠 首页</div><h3 style="padding:0 16px;font-size:14px;color:#666">'+p+'</h3>'+b;
    window.scrollTo(0,0);
  });
}

window.onhashchange=function(){
  if(document.getElementById("lock").style.display!=="none")return;
  var h=location.hash.slice(1);
  if(h.startsWith("/f/"))rd(h.slice(3));
  else ls(h);
};
window.onhashchange();
</script></body></html>
