function ls(p){
  var h='<div class="list">';
  if(p){h+='<a class="back" href="#/">← 返回</a>';}
  var depth=p?p.split("/").length+1:1;
  var items=[];
  for(var i=0;i<D.length;i++){
    var f=D[i];
    var d=f.d.split("/").length;
    if(d!==depth)continue;
    if(!p&&d===1)items.push(f);
    else if(p&&f.d.indexOf(p+"/")===0)items.push(f);
  }
  if(p)items.unshift({n:"..",d:p.split("/").slice(0,-1).join("/")||"",t:1});
  for(var i=0;i<items.length;i++){
    var f=items[i];
    var ic=f.t?"📁":"📄";
    var mt=f.t?"文件夹":f.n.split(".").pop().toUpperCase()+" 文件";
    if(f.t){
      h+='<div class="row" onclick="ls(\''+f.d.replace(/'/g,"\\'")+'\')"><div class="ico">'+ic+'</div><div class="txt"><div class="t">'+f.n+'</div><div class="s">'+mt+'</div></div></div>';
    }else{
      h+='<div class="row" onclick="rd(\''+f.d.replace(/'/g,"\\'")+'\')"><div class="ico">'+ic+'</div><div class="txt"><div class="t">'+f.n+'</div><div class="s">'+f.d+'</div></div></div>';
    }
  }
  h+='</div>';
  document.getElementById("v").innerHTML=h;
}

function rd(p){
  fetch("files/"+p).then(function(r){return r.text()}).then(function(t){
    var ext=p.split(".").pop().toLowerCase();
    var b;
    if(ext==="md"){
      b='<div class="md">'+t
        .replace(/^### (.+)$/gm,"<h3>$1</h3>")
        .replace(/^## (.+)$/gm,"<h2>$1</h2>")
        .replace(/^# (.+)$/gm,"<h1>$1</h1>")
        .replace(/^> (.+)$/gm,"<blockquote>$1</blockquote>")
        .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
        .replace(/`(.+?)`/g,"<code>$1</code>")
        .replace(/^- (.+)$/gm,"<li>$1</li>")
        .replace(/^\d+\. (.+)$/gm,"<li>$1</li>")+"</div>";
    }else{
      b="<pre>"+t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")+"</pre>";
    }
    document.getElementById("v").innerHTML='<div class="back" onclick="ls(\'\')">🏠 首页</div><h3 style="padding:0 16px;font-size:16px;color:#666">'+p+'</h3>'+b;
    window.scrollTo(0,0);
  });
}

window.onhashchange=function(){
  var h=location.hash.slice(1);
  if(h==="/")ls("");
  else if(h.startsWith("/f/"))rd(h.slice(3));
  else ls(h);
};
window.onhashchange();
