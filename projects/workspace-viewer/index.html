function getChildren(path){
  var depth = path ? path.split('/').length+1 : 1;
  return FILES.filter(function(f){
    if(f.path.split('/').length !== depth) return false;
    if(!path) return true;
    return f.path.indexOf(path+'/')===0;
  });
}
function showDir(path){
  var items = getChildren(path);
  if(path) items.unshift({name:'..',type:'dir',path:path.split('/').slice(0,-1).join('/')});
  var h='';
  items.forEach(function(f){
    var icon=f.type==='dir'?'📁':'📄';
    var meta=f.type==='dir'?'文件夹':f.name.split('.').pop()+' 文件';
    var act=f.type==='dir'?'showDir("'+f.path+'")':'showFile("'+f.path+'")';
    h+='<div class="item" onclick="'+act+'"><div class="icon">'+icon+'</div><div><div class="name">'+f.name+'</div><div class="meta">'+meta+'</div></div></div>';
  });
  document.getElementById('app').innerHTML=h?'<div class="items">'+h+'</div>':'<div class="empty">空目录</div>';
}
function showFile(path){
  fetch('files/'+path).then(function(r){return r.text()}).then(function(text){
    var ext=path.split('.').pop().toLowerCase();
    var body=ext==='md'?'<div class="md">'+simpleMD(text)+'</div>':'<pre>'+text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</pre>';
    document.getElementById('app').innerHTML='<div class="back" onclick="showDir(\'\')">🏠 首页</div>'+body;
    window.scrollTo(0,0);
  });
}
function simpleMD(t){
  return t.replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
}
document.getElementById('q').addEventListener('input',function(e){
  var q=e.target.value.toLowerCase();
  if(!q){showDir('');return;}
  var r=FILES.filter(function(f){return f.type==='file'&&f.name.toLowerCase().indexOf(q)>=0});
  var h='';
  r.forEach(function(f){
    h+='<div class="item" onclick="showFile(\''+f.path+'\')"><div class="icon">📄</div><div><div class="name">'+f.name+'</div><div class="meta">'+f.path+'</div></div></div>';
  });
  document.getElementById('app').innerHTML='<div class="items">'+(h||'<div class="empty">无匹配</div>')+'</div>';
});
showDir('');
